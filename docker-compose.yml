services:
  vmware-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: vmware-sync:latest
    env_file: .env
    volumes:
      - ./vcenters.txt:/app/vcenters.txt
      - ./regex:/app/regex
      - ./log:/app/log
      - ./vmware-sync.py:/app/vmware-sync.py
      - ./pynetbox2.py:/app/pynetbox2.py
    networks:
      - o11y
    environment:
      - PYTHONUNBUFFERED=1 
    command: ["sh", "-c", "python3 vmware-sync.py && echo Waiting for $${RESTART_DELAY:-30} seconds to restart && sleep $${RESTART_DELAY:-30}"]
    restart: unless-stopped

networks:
  o11y:
    external: true
